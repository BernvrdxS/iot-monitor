version: '3.9'

services:
  linux:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trabalho03-linux
    restart: unless-stopped
    ports:
      - "8080:80"           # Apache acessível em http://localhost:8080
    volumes:
      - ./scripts:/app/scripts          # Scripts sincronizados com o host
      - ./source:/app/source            # Fonte dos arquivos estáticos
      - ./logs:/app/iot/logs            # Logs persistidos no host
      - ./backups:/app/iot/backups      # Backups persistidos no host
      - ./evidencias:/app/evidencias    # Evidências persistidas no host
      - iot_data:/app/iot               # Volume nomeado para dados do IoT
    tty: true
    stdin_open: true

# ── Volumes ────────────────────────────────────────────────────
volumes:
  iot_data:
    driver: local
    name: iot_trabalho03_data